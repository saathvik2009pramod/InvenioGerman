<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modules · Deutsch Lernen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="modules-page">

  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>

  <!-- Hero header -->
  <div class="modules-hero">
    <a href="index.html" class="back-link">← Start Over</a>
    <span class="level-badge" id="levelBadge">A1</span>
    <h2 id="modulePageTitle">A1 — Beginner</h2>
    <p>5 modules &nbsp;·&nbsp; Learn at your pace</p>
  </div>

  <!-- Module grid -->
  <div class="modules-grid" id="modulesGrid"></div>

  <script src="script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const level  = params.get('level') || localStorage.getItem('deutschLevel') || 'A1';

    const MODULES = {
      A1: [
        { title: 'Greetings & Introductions', sub: 'Hello, names, and basic phrases' },
        { title: 'Numbers & Colors',          sub: 'Count 1–100 and name basic colors' },
        { title: 'Articles & Gender',         sub: 'der, die, das — mastering noun gender' },
        { title: 'Everyday Verbs',            sub: 'sein, haben, machen, gehen' },
        { title: 'Family & People',           sub: 'Describe family members and relationships' }
      ],
      B1: [
        { title: 'Perfekt Tense',             sub: 'Talking about past events naturally' },
        { title: 'Modal Verbs',               sub: 'können, müssen, dürfen, wollen' },
        { title: 'Subordinate Clauses',       sub: 'weil, obwohl, dass, wenn' },
        { title: 'Prepositions & Cases',      sub: 'Accusative vs. Dative in context' },
        { title: 'Opinion & Argument',        sub: 'Express views and debate in German' }
      ],
      C1: [
        { title: 'Konjunktiv II',             sub: 'Reported speech & hypothetical mood' },
        { title: 'Passive Voice',             sub: 'Vorgangspassiv and Zustandspassiv' },
        { title: 'Extended Participial Phrases', sub: 'Complex noun-phrase constructions' },
        { title: 'Register & Formality',      sub: 'Academic, formal and business German' },
        { title: 'Advanced Idioms',           sub: 'Native-level expressions and collocations' }
      ]
    };

    const levelNames = { A1: 'A1 — Beginner', B1: 'B1 — Intermediate', C1: 'C1 — Advanced' };
    const levelClasses = { A1: 'a1', B1: 'b1', C1: 'c1' };

    document.getElementById('modulePageTitle').textContent = levelNames[level] || levelNames['A1'];
    const badge = document.getElementById('levelBadge');
    badge.textContent = level;
    badge.className   = `level-badge ${levelClasses[level]}`;

    const grid = document.getElementById('modulesGrid');
    const mods = MODULES[level] || MODULES['A1'];
    mods.forEach((m, i) => {
      const a = document.createElement('a');
      a.href      = `module.html?level=${level}&module=${i}`;
      a.className = 'module-card animate-in';
      a.style.animationDelay = `${i * 0.07}s`;
      a.innerHTML = `
        <div class="module-num">Module ${i + 1}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-sub">${m.sub}</div>
        <div class="module-arrow">→</div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>

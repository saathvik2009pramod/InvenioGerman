            { q: '"Das Buch liegt auf ___ Tisch." (The book lies on the table — location)', opts: ['dem','den','des','die'], correct: 0, hint: 'Location → Dative. "Tisch" is masculine → Dative = "dem".' }
          ]
        },
        {
          title: 'Opinion & Argument',
          notes: `
            <h2>Expressing Opinions in German</h2>
            <p>Being able to express, support, and counter arguments is crucial at B1. Here are key phrases:</p>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Giving Your Opinion</h3>
            <ul>
              <li>Ich finde, dass… (I think/find that…)</li>
              <li>Meiner Meinung nach… (In my opinion…)</li>
              <li>Ich bin der Meinung, dass… (I am of the opinion that…)</li>
              <li>Ich glaube/denke, dass… (I believe/think that…)</li>
            </ul>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Agreeing & Disagreeing</h3>
            <ul>
              <li>Das stimmt. / Genau. (That's right. / Exactly.)</li>
              <li>Da bin ich anderer Meinung. (I disagree.)</li>
              <li>Ich sehe das anders. (I see it differently.)</li>
            </ul>
            <div class="note-box"><span class="box-label">Note:</span><p>"Meiner Meinung nach" is a set phrase — "nach" always comes at the END: "Meiner Meinung <strong>nach</strong>".</p></div>
            <div class="tip-box"><span class="box-label">Tip:</span><p>In German B1 speaking exams, structure your opinion: State view → Give reason (weil/denn) → Give example (zum Beispiel).</p></div>
          `,
          questions: [
            { q: 'What does "Meiner Meinung nach" mean?', opts: ['After my opinion','In my opinion','My opinion is','I have an opinion'], correct: 1, hint: '"Meinung" = opinion. "Meiner Meinung nach" is a fixed phrase.' },
            { q: 'Which phrase expresses DISAGREEMENT?', opts: ['Das stimmt.','Genau!','Ich sehe das anders.','Ich finde auch.'], correct: 2, hint: '"Anders" means "differently" — "I see that differently."' },
            { q: 'Complete: "Ich finde, ___ das gut ist."', opts: ['weil','dass','obwohl','wenn'], correct: 1, hint: '"Ich finde, dass..." introduces an opinion clause with "dass".' },
            { q: '"Denn" is used to:', opts: ['end a sentence','show contrast','give a reason (but without verb-final)','introduce a question'], correct: 2, hint: '"Denn" = because/for, but unlike "weil", it does NOT send the verb to the end.' },
            { q: 'Which phrase means "I think"?', opts: ['Ich hoffe','Ich weiß','Ich denke','Ich soll'], correct: 2, hint: '"Denken" = to think. "Ich denke, dass..." is a common opinion starter.' }
          ]
        }
      ],
      C1: [
        {
          title: 'Konjunktiv II',
          notes: `
            <h2>Konjunktiv II</h2>
            <p>The Konjunktiv II is used to express hypotheticals, wishes, polite requests, and in reported speech. It is essential for advanced, formal German.</p>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Formation</h3>
            <ul>
              <li><strong>würde + Infinitiv</strong> (most common): Ich würde gerne kommen.</li>
              <li>Strong forms for common verbs: wäre (sein), hätte (haben), könnte (können), müsste (müssen)</li>
            </ul>
            <div class="note-box"><span class="box-label">Note:</span><p>In formal/written German, prefer the strong Konjunktiv II forms over "würde" for common verbs: write "Er käme" not "Er würde kommen" — though both are understood.</p></div>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Key Uses</h3>
            <ul>
              <li>Hypotheticals: Wenn ich Zeit hätte, würde ich reisen.</li>
              <li>Polite requests: Könnten Sie mir bitte helfen?</li>
              <li>Reported speech: Er sagte, er käme später.</li>
              <li>Wishes: Wenn ich nur mehr Deutsch spräche!</li>
            </ul>
            <div class="tip-box"><span class="box-label">Tip:</span><p>In reported speech at C1, Konjunktiv I is technically preferred for formal writing. But Konjunktiv II is used when Konjunktiv I would be identical to indicative (e.g. with "sie/Sie").</p></div>
          `,
          questions: [
            { q: 'What is the Konjunktiv II form of "sein"?', opts: ['sei','würde sein','wäre','gewesen'], correct: 2, hint: 'The strong Konjunktiv II of "sein" is "wäre" — like "was" but with an umlaut and subjunctive ending.' },
            { q: 'Which sentence expresses a polite request using Konjunktiv II?', opts: ['Helfen Sie mir bitte!','Können Sie mir helfen?','Könnten Sie mir helfen?','Sie helfen mir.'], correct: 2, hint: '"Könnten" is the Konjunktiv II of "können" — it softens the request considerably.' },
            { q: 'In a Konditionalsatz (if-clause), Konjunktiv II appears:', opts: ['only in the main clause','only in the wenn-clause','in both clauses','in neither clause'], correct: 2, hint: '"Wenn ich Zeit hätte, würde ich kommen." — Konjunktiv II appears in both the wenn-clause and the main clause.' },
            { q: '"Er sagte, er käme morgen" — "käme" is used because:', opts: ['It is Konjunktiv I','It is the Perfekt of kommen','It is Konjunktiv II of kommen, used in reported speech','It is an irregular present tense'], correct: 2, hint: '"Käme" is Konjunktiv II of "kommen", used here in indirect speech to signal the content is reported, not confirmed.' },
            { q: 'Which is the most formal, written alternative to "Er würde kommen"?', opts: ['Er kann kommen','Er käme','Er ist gekommen','Er kommt'], correct: 1, hint: 'In formal German writing, the synthetic Konjunktiv II form "käme" is preferred over the analytic "würde kommen".' }
          ]
        },
        {
          title: 'Passive Voice',
          notes: `
            <h2>Passive Voice</h2>
            <p>German has two types of passive: the Vorgangspassiv (process passive) and the Zustandspassiv (state passive).</p>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Vorgangspassiv (Action)</h3>
            <ul>
              <li>Formed with: <strong>werden + Partizip II</strong></li>
              <li>Das Haus wird gebaut. (The house is being built.)</li>
              <li>Der Brief wurde geschrieben. (The letter was written.)</li>
            </ul>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Zustandspassiv (Result State)</h3>
            <ul>
              <li>Formed with: <strong>sein + Partizip II</strong></li>
              <li>Das Haus ist gebaut. (The house is built — finished state.)</li>
            </ul>
            <div class="note-box"><span class="box-label">Note:</span><p>The agent (doer) can be expressed with "von + Dative": "Das Buch wurde von Goethe geschrieben." In formal or scientific German, "durch + Accusative" is used for indirect agents.</p></div>
            <div class="tip-box"><span class="box-label">Tip:</span><p>The Zustandspassiv with "sein" can be confused with an adjective predicate. Context clarifies: "Die Tür ist geöffnet" could be state passive (the door has been opened) or just a description (the door is open).</p></div>
          `,
          questions: [
            { q: 'What auxiliary verb forms the Vorgangspassiv?', opts: ['sein','haben','werden','lassen'], correct: 2, hint: '"Werden" + Partizip II = the process passive voice.' },
            { q: '"Das Auto ist repariert." — This is an example of:', opts: ['Vorgangspassiv','Zustandspassiv','Perfekt aktiv','Konjunktiv II'], correct: 1, hint: '"Sein + Partizip II" describes a resulting state — the car is in a repaired condition.' },
            { q: 'How do you express the agent in a passive sentence?', opts: ['mit + Dative','von + Dative','durch + Nominative','für + Accusative'], correct: 1, hint: '"von" + Dative introduces the person responsible: "von dem Ingenieur repariert".' },
            { q: 'Rewrite in passive: "Man hat das Fenster geöffnet."', opts: ['Das Fenster hat geöffnet worden.','Das Fenster wurde geöffnet.','Das Fenster ist geöffnet worden.','Das Fenster ist geöffnet.'], correct: 2, hint: 'Perfekt passive = sein + Partizip II + worden: "ist geöffnet worden".' },
            { q: '"Durch" (rather than "von") is used in passive to indicate:', opts: ['the direct agent','an indirect means or cause','the time of action','the location'], correct: 1, hint: '"Durch den Sturm wurden Bäume gefällt" — the storm is an indirect cause, not an intentional agent.' }
          ]
        },
        {
          title: 'Extended Participial Phrases',
          notes: `
            <h2>Extended Participial Phrases (Erweitertes Partizipialattribut)</h2>
            <p>This is one of the most distinctive features of formal written German. Instead of a relative clause, German can compress it into an extended participial phrase placed before the noun.</p>
            <p><strong>Relative clause:</strong> der Mann, der das Buch geschrieben hat<br/>
            <strong>Participial phrase:</strong> der das Buch geschrieben habende Mann</p>
            <div class="note-box"><span class="box-label">Note:</span><p>The structure is: article + [all modifiers + Partizip I or II with adjective ending] + noun. Everything is "sandwiched" between the article and the noun.</p></div>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">When to use which participle</h3>
            <ul>
              <li><strong>Partizip I</strong> (active, ongoing): das schlafende Kind (the sleeping child)</li>
              <li><strong>Partizip II</strong> (passive, completed): das gebaute Haus (the built house)</li>
            </ul>
            <div class="tip-box"><span class="box-label">Tip:</span><p>These constructions appear heavily in newspaper language, legal texts, and academic writing. When reading such texts, identify the article first, then search right before the noun for the participle with its adjective ending.</p></div>
          `,
          questions: [
            { q: '"Das weinende Kind" — what is "weinende" here?', opts: ['Partizip II used as adjective','Partizip I used as adjective','An infinitive','A past tense form'], correct: 1, hint: 'Partizip I = stem + -end + adjective ending. "Weinen" → weinend → weinende.' },
            { q: 'What is the Partizip I of "arbeiten"?', opts: ['gearbeitet','gearbeiten','arbeitend','arbeitete'], correct: 2, hint: 'Partizip I = infinitive stem + -d. "arbeiten" → arbeitend.' },
            { q: '"Der von vielen gelesene Roman" means:', opts: ['The novel read by many','The novel reading many','The novel that reads many','A novel about many readers'], correct: 0, hint: '"Gelesen" is Partizip II, functioning as a passive adjective — the novel that was read by many.' },
            { q: 'Extended participial phrases are most common in:', opts: ['Spoken informal German','Academic and newspaper language','Children\'s books','SMS messages'], correct: 1, hint: 'These complex structures are a hallmark of formal written German registers.' },
            { q: 'Convert: "der Zug, der gerade ankommende" → correct form before "Zug":', opts: ['der gerade ankommend Zug','der gerade ankommende Zug','den gerade ankommenden Zug','die gerade ankommende Zug'], correct: 1, hint: '"Zug" is masculine nominative → adjective ending is -e. "Der + [adj] + Noun" = der ankommende Zug.' }
          ]
        },
        {
          title: 'Register & Formality',
          notes: `
            <h2>Register & Formality in German</h2>
            <p>At C1, awareness of register — the level of formality in language — is crucial. German has very distinct formal and informal registers.</p>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Key Distinctions</h3>
            <ul>
              <li><strong>du / Sie</strong>: informal vs. formal address</li>
              <li><strong>Vocabulary choices</strong>: "kriegen" (informal) vs. "erhalten" (formal) — both mean "to receive"</li>
              <li><strong>Verb forms</strong>: Preterite (Präteritum) is preferred in writing over Perfekt</li>
              <li><strong>Passive constructions</strong>: More common in formal/academic texts</li>
            </ul>
            <div class="note-box"><span class="box-label">Note:</span><p>In formal writing, avoid contractions and colloquialisms. "Ich hab's" becomes "Ich habe es" and "wegen dem" (colloquial dative) becomes "wegen des" (correct genitive).</p></div>
            <h3 style="color:var(--gold-light);margin:20px 0 10px;">Formal Equivalents</h3>
            <ul>
              <li>kriegen → erhalten / bekommen (formal)</li>
              <li>machen → durchführen / realisieren (formal)</li>
              <li>sagen → mitteilen / informieren (formal)</li>
            </ul>
            <div class="tip-box"><span class="box-label">Tip:</span><p>The Preterite (Präteritum) of modal verbs is preferred even in spoken formal contexts: "Ich wollte fragen..." rather than "Ich habe fragen wollen..."</p></div>
          `,
          questions: [
            { q: 'Which word is the FORMAL equivalent of "kriegen"?', opts: ['bekommen','nehmen','holen','erhalten'], correct: 3, hint: '"Erhalten" is the most formal word for "to receive" — used in official correspondence.' },
            { q: 'In formal written German, which past tense is preferred over Perfekt?', opts: ['Plusquamperfekt','Futur II','Präteritum','Konjunktiv I'], correct: 2, hint: 'The Präteritum (simple past) is the standard in written narratives and formal texts.' },
            { q: '"Wegen des Wetters" is correct because "wegen" governs:', opts: ['Accusative','Nominative','Dative (colloquial)','Genitive'], correct: 3, hint: 'Formally, "wegen" takes the Genitive. "Wegen dem" is only accepted colloquially.' },
            { q: 'Which feature is MORE common in formal German?', opts: ['Active voice','du-form','Passive constructions','Colloquial contractions'], correct: 2, hint: 'Academic and official texts frequently use passive voice to depersonalise statements.' },
            { q: 'The formal equivalent of "Ich hab\'s gemacht" is:', opts: ['Ich habe es getan.','Ich machte es','Ich hab es gemacht.','Ich tut es.'], correct: 0, hint: '"Habe es getan" — no contraction, fully spelled out, and "getan" (done) is stylistically more formal than "gemacht" in some contexts.' }
          ]
        },
        {
          title: 'Advanced Idioms',
          notes: `
            <h2>Advanced German Idioms</h2>
            <p>Idiomatic expressions make your German sound natural and native-like. Here are high-frequency idioms you'll encounter at C1.</p>
            <ul>
              <li><strong>auf dem Laufenden bleiben</strong> — to stay up to date</li>
              <li><strong>jemandem auf den Nerven gehen</strong> — to get on someone's nerves</li>
              <li><strong>den Nagel auf den Kopf treffen</strong> — to hit the nail on the head</li>
              <li><strong>Eulen nach Athen tragen</strong> — to carry coals to Newcastle (pointless task)</li>
              <li><strong>jemandem einen Bären aufbinden</strong> — to pull someone's leg / tell a tall tale</li>
              <li><strong>etwas auf Eis legen</strong> — to put something on hold / on ice</li>
            </ul>
            <div class="note-box"><span class="box-label">Note:</span><p>German idioms are often untranslatable literally. "Jemandem einen Bären aufbinden" literally means "to tie a bear onto someone" — but idiomatically means to trick or deceive them.</p></div>
            <div class="tip-box"><span class="box-label">Tip:</span><p>Learn idioms in full sentences with context. Don't just memorize the phrase — learn what situation triggers it and what emotional register it carries (humorous, critical, formal, casual).</p></div>
          `,
          questions: [
            { q: '"Den Nagel auf den Kopf treffen" means:', opts: ['To make a mistake','To hit the nail on the head','To lose one\'s temper','To give up easily'], correct: 1, hint: 'This idiom is almost a direct parallel to its English equivalent.' },
            { q: '"Etwas auf Eis legen" means:', opts: ['To cool something down','To freeze in place','To put on hold','To preserve forever'], correct: 2, hint: 'Like the English "put on ice" — to pause or postpone something.' },
            { q: '"Eulen nach Athen tragen" describes:', opts: ['Wisdom','A pointless or redundant task','A complicated plan','Carrying heavy burdens'], correct: 1, hint: 'Athens = city of wisdom (owls). Bringing owls there is redundant — like "coals to Newcastle".' },
            { q: '"Jemandem einen Bären aufbinden" means:', opts: ['To burden someone','To lie to / deceive someone','To help someone with a heavy load','To send someone on an errand'], correct: 1, hint: 'This colorful idiom means to tell someone an unbelievable story — to trick or pull their leg.' },
            { q: '"Auf dem Laufenden bleiben" is closest to:', opts: ['To stay physically active','To keep running','To stay up to date / informed','To remain in the race'], correct: 2, hint: '"Laufend" can mean "ongoing" or "current" — staying on the current track means staying informed.' }
          ]
        }
      ]
    };

    // ── Setup ──
    const data = MODULE_DATA[level]?.[modIndex];
    if (!data) { window.location.href = `home.html?level=${level}`; }

    document.getElementById('stickyTitle').textContent = data.title;
    document.getElementById('notesBody').innerHTML     = data.notes;

    // Practice state
    let pCurrent  = 0;
    let pAttempts = 0;
    let pSelected = null;
    let correctCount = 0;

    function startPractice() {
      document.getElementById('notesSection').style.display = 'none';
      document.getElementById('practiceSection').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      renderPractice();
    }

    function renderPractice() {
      const q = data.questions[pCurrent];
      pAttempts = 0; pSelected = null;

      document.getElementById('practiceCounter').textContent = `${pCurrent + 1} / 5`;
      document.getElementById('practiceProgress').style.width = `${(pCurrent / 5) * 100}%`;
      document.getElementById('practiceQ').textContent = q.q;
      document.getElementById('practiceHint').classList.remove('show');
      document.getElementById('practiceSubmit').disabled = true;

      const letters = ['A','B','C','D'];
      const list = document.getElementById('practiceAnswers');
      list.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-option';
        btn.innerHTML = `<span class="answer-letter">${letters[i]}</span> ${opt}`;
        btn.onclick = () => selectPractice(i);
        list.appendChild(btn);
      });

      const block = document.getElementById('practiceBlock');
      block.style.animation = 'none'; block.offsetHeight;
      block.style.animation = 'fadeIn 0.35s ease both';
    }

    function selectPractice(idx) {
      const btns = document.querySelectorAll('#practiceAnswers .answer-option');
      btns.forEach((b, i) => {
        if (!b.classList.contains('wrong')) b.classList.toggle('selected', i === idx);
      });
      pSelected = idx;
      document.getElementById('practiceSubmit').disabled = false;
      document.getElementById('practiceHint').classList.remove('show');
    }

    function submitPractice() {
      if (pSelected === null) return;
      const q = data.questions[pCurrent];
      const btns = [...document.querySelectorAll('#practiceAnswers .answer-option')];
      btns.forEach(b => b.disabled = true);

      if (pSelected === q.correct) {
        btns[pSelected].classList.remove('selected');
        btns[pSelected].classList.add('correct');
        correctCount++;
        document.getElementById('practiceSubmit').disabled = true;
        setTimeout(nextPractice, 900);
      } else {
        btns[pSelected].classList.remove('selected');
        btns[pSelected].classList.add('wrong');
        pAttempts++;

        if (pAttempts === 1) {
          const hint = document.getElementById('practiceHint');
          document.getElementById('practiceHintText').innerHTML = `<strong>Hint:</strong> ${q.hint}`;
          hint.classList.add('show');
          btns.forEach((b, i) => { if (i !== pSelected) b.disabled = false; });
          document.getElementById('practiceSubmit').disabled = true;
          pSelected = null;
        } else {
          btns[q.correct].classList.add('correct');
          document.getElementById('practiceSubmit').disabled = true;
          setTimeout(nextPractice, 1400);
        }
      }
    }

    // Re-select on retry
    document.getElementById('practiceAnswers').addEventListener('click', (e) => {
      const btn = e.target.closest('.answer-option');
      if (!btn || btn.disabled || btn.classList.contains('wrong')) return;
      const btns = [...document.querySelectorAll('#practiceAnswers .answer-option')];
      btns.forEach(b => { if (!b.classList.contains('wrong')) b.classList.remove('selected'); });
      btn.classList.add('selected');
      pSelected = btns.indexOf(btn);
      document.getElementById('practiceSubmit').disabled = false;
    }, true);

    function nextPractice() {
      pCurrent++;
      if (pCurrent >= data.questions.length) {
        showCompletion();
      } else {
        renderPractice();
      }
    }

    function showCompletion() {
      document.getElementById('practiceProgress').style.width = '100%';
      document.getElementById('practiceBlock').style.display = 'none';
      const comp = document.getElementById('completionScreen');
      comp.classList.add('show');
      document.getElementById('completionScore').textContent =
        `You got ${correctCount} out of 5 correct. Keep it up!`;

      const mods = MODULE_DATA[level];
      const nextBtn = document.getElementById('nextModuleBtn');
      if (modIndex >= mods.length - 1) {
        nextBtn.textContent = '🎉 All Modules Done!';
        nextBtn.onclick = () => window.location.href = `home.html?level=${level}`;
      }
    }

    function goNextModule() {
      const next = modIndex + 1;
      if (next < MODULE_DATA[level].length) {
        window.location.href = `module.html?level=${level}&module=${next}`;
      } else {
        window.location.href = `home.html?level=${level}`;
      }
    }

    function goBackModules() {
      window.location.href = `home.html?level=${level}`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level Test · Deutsch Lernen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="test-page">

  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>

  <div class="test-header">
    <div class="test-meta">
      <span class="q-counter" id="qCounter">Question 1 / 6</span>
      <span id="scoreTrack">Score: 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="question-card" id="questionCard">
    <p class="question-text" id="questionText"></p>
    <div class="answers-list" id="answersList"></div>
    <div class="hint-popup" id="hintPopup">
      <span class="hint-icon">💡</span>
      <p id="hintText"><strong>Hint:</strong> </p>
    </div>
    <div class="submit-btn-wrap">
      <button class="btn-primary" id="submitBtn" onclick="handleSubmit()" disabled>
        Submit <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <script>
    // ── Question Bank (2 easy A1, 2 medium B1, 2 hard C1) ──
    const questions = [
      {
        level: 'A1',
        text: 'How do you say "Good morning" in German?',
        options: ['Guten Abend', 'Guten Morgen', 'Gute Nacht', 'Auf Wiedersehen'],
        correct: 1,
        hint: 'Think of "Morgen" — it means morning in German.'
      },
      {
        level: 'A1',
        text: 'Fill in the blank: "Ich ___ Student." (I am a student.)',
        options: ['ist', 'bist', 'bin', 'sind'],
        correct: 2,
        hint: '"Ich" (I) uses the verb form "bin" — the first-person singular of "sein" (to be).'
      },
      {
        level: 'B1',
        text: 'Which sentence uses the Perfekt tense correctly?',
        options: [
          'Ich habe gestern ins Kino gegangen.',
          'Ich bin gestern ins Kino gegangen.',
          'Ich war gestern ins Kino gegangen.',
          'Ich hatte gestern ins Kino gegangen.'
        ],
        correct: 1,
        hint: 'Verbs of movement (like "gehen") use "sein" as the auxiliary in Perfekt, not "haben".'
      },
      {
        level: 'B1',
        text: 'Choose the correct word order: "Obwohl es regnete, ___."',
        options: [
          '...gingen wir spazieren.',
          '...wir gingen spazieren.',
          '...spazieren gingen wir.',
          '...wir spazieren gingen.'
        ],
        correct: 0,
        hint: 'After "obwohl" (although), the subordinate clause has verb-final order, but the main clause that follows uses regular V2 order.'
      },
      {
        level: 'C1',
        text: 'Which word best fills the blank? "Seine Aussagen entbehrten jeder ___." (His statements lacked any basis.)',
        options: ['Grundlage', 'Untergrund', 'Fundament', 'Hintergrund'],
        correct: 0,
        hint: '"Grundlage" means "basis/foundation" in an abstract sense. "Einer Sache entbehren" = to lack something.'
      },
      {
        level: 'C1',
        text: 'Identify the correct use of the Konjunktiv II in formal German:',
        options: [
          'Er sagte, er geht morgen.',
          'Er sagte, er würde morgen gehen.',
          'Er sagte, er geht morgen gehen.',
          'Er sagte, er ist morgen gegangen.'
        ],
        correct: 1,
        hint: 'In reported speech, Konjunktiv II is used to express distancing. "Würde + infinitive" is the standard pattern.'
      }
    ];

    let current = 0;
    let score   = 0;
    let attempts = 0;
    let selectedIdx = null;

    function renderQuestion() {
      const q = questions[current];
      attempts = 0;
      selectedIdx = null;

      document.getElementById('qCounter').textContent    = `Question ${current + 1} / 6`;
      document.getElementById('scoreTrack').textContent  = `Score: ${score}`;
      document.getElementById('progressFill').style.width = `${(current / 6) * 100}%`;
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('hintPopup').classList.remove('show');
      document.getElementById('submitBtn').disabled = true;

      const letters = ['A','B','C','D'];
      const list = document.getElementById('answersList');
      list.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-option';
        btn.innerHTML = `<span class="answer-letter">${letters[i]}</span> ${opt}`;
        btn.onclick = () => selectOption(i);
        list.appendChild(btn);
      });

      // Animate card
      const card = document.getElementById('questionCard');
      card.style.animation = 'none';
      card.offsetHeight; // reflow
      card.style.animation = 'fadeIn 0.35s ease both';
    }

    function selectOption(idx) {
      selectedIdx = idx;
      document.querySelectorAll('.answer-option').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
      });
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('hintPopup').classList.remove('show');
    }

    function handleSubmit() {
      if (selectedIdx === null) return;
      const q = questions[current];
      const btns = document.querySelectorAll('.answer-option');
      btns.forEach(b => b.disabled = true);

      if (selectedIdx === q.correct) {
        // Correct
        btns[selectedIdx].classList.remove('selected');
        btns[selectedIdx].classList.add('correct');
        score++;
        document.getElementById('submitBtn').disabled = true;
        setTimeout(nextQuestion, 900);
      } else {
        // Wrong
        btns[selectedIdx].classList.remove('selected');
        btns[selectedIdx].classList.add('wrong');
        attempts++;

        if (attempts === 1) {
          // First wrong — show hint, allow retry
          const hint = document.getElementById('hintPopup');
          document.getElementById('hintText').innerHTML = `<strong>Hint:</strong> ${q.hint}`;
          hint.classList.add('show');
          // Re-enable only unchosen options
          btns.forEach((b, i) => {
            if (i !== selectedIdx) { b.disabled = false; }
          });
          document.getElementById('submitBtn').disabled = true;
          selectedIdx = null;
          // Re-enable submit when new selection made
        } else {
          // Second wrong — reveal correct, auto-advance
          btns[q.correct].classList.add('correct');
          document.getElementById('submitBtn').disabled = true;
          setTimeout(nextQuestion, 1400);
        }
      }
    }

    // Re-attach select logic after retry
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.answer-option');
      if (!btn || btn.disabled || btn.classList.contains('wrong')) return;
      const btns = [...document.querySelectorAll('.answer-option')];
      const idx = btns.indexOf(btn);
      if (idx === -1) return;
      btns.forEach(b => { if (!b.classList.contains('wrong')) b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedIdx = idx;
      document.getElementById('submitBtn').disabled = false;
    }, true);

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        finishTest();
      } else {
        renderQuestion();
      }
    }

    function finishTest() {
      // Determine level
      let level, levelName, desc;
      if (score <= 2) {
        level = 'A1'; levelName = 'Beginner';
        desc = 'You\'re just starting out — that\'s exciting! Your A1 modules will build a solid foundation with greetings, basic grammar, and everyday vocabulary.';
      } else if (score <= 4) {
        level = 'B1'; levelName = 'Intermediate';
        desc = 'You have a good grasp of German basics. Your B1 modules will help you express ideas, handle everyday situations, and tackle more complex grammar.';
      } else {
        level = 'C1'; levelName = 'Advanced';
        desc = 'Impressive! You have a strong command of German. Your C1 modules will sharpen your nuance, formal writing, and complex grammatical structures.';
      }

      localStorage.setItem('deutschLevel', level);
      localStorage.setItem('deutschScore', score);

      // Redirect to result page
      window.location.href = `result.html?level=${level}&score=${score}&name=${encodeURIComponent(levelName)}&desc=${encodeURIComponent(desc)}`;
    }

    // Init
    renderQuestion();
  </script>
</body>
</html>
